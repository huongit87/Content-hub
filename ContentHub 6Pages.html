<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Hub — 5 Pages</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--pink:#F2C4CE;--pink-soft:#FAF0F3;--pink-deep:#C4667A;--pink-btn:#D4536A;--sage:#C8D8C0;--sage-soft:#EDF2EA;--sage-btn:#5DAA7A;--cream:#FAF7F2;--text:#2A1F1A;--text-mid:#6B5C50;--text-soft:#A89990;--border:#E8DDD4;--white:#FFFFFF;--gold:#C9A84C;--gold-soft:#FBF5E6;--purple:#9B8EC4;--purple-soft:#F3F0FA;--r:14px;--r-sm:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F5F5F7;color:var(--text);min-height:100vh;}
header{background:var(--white);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-name{font-family:'Playfair Display',serif;font-size:18px;}
.logo-tag{font-size:10px;color:var(--text-soft);letter-spacing:.08em;text-transform:uppercase;}
.api-row{display:flex;align-items:center;gap:8px;}
.api-label{font-size:11px;color:var(--text-soft);text-transform:uppercase;letter-spacing:.05em;}
.api-input{background:var(--cream);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 12px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;width:210px;}
.main{max-width:980px;margin:0 auto;padding:28px 24px 80px;}
.page-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px;}
.page-card{background:var(--white);border:2px solid var(--border);border-radius:var(--r);padding:16px 10px;text-align:center;cursor:pointer;transition:all .2s;}
.page-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08);}
.page-icon{font-size:26px;margin-bottom:6px;}
.page-name{font-size:12px;font-weight:500;line-height:1.3;}
.content-area{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:none;}
.page-header{padding:18px 22px;display:flex;align-items:center;gap:14px;}
.page-body{padding:22px;}
.ctabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.ctab{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--cream);color:var(--text-mid);transition:all .15s;}
.brand-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.brand-card{background:var(--cream);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;cursor:pointer;transition:all .15s;}
.brand-card:hover{border-color:var(--pink);background:var(--pink-soft);}
.brand-card.sel{border-color:var(--pink-deep);background:var(--pink-soft);}
.bname{font-size:12px;font-weight:500;}
.bsub{font-size:10px;color:var(--text-soft);margin-top:2px;}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.field label{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--text-soft);}
.field input,.field select{background:var(--cream);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 11px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;}
.field input::placeholder{color:var(--text-soft);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:12px;}
.fgrid .field{margin-bottom:0;}
.gen-btn{width:100%;padding:12px;color:white;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:6px;}
.gen-btn:hover{opacity:.88;}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;}
.loading{display:none;text-align:center;padding:28px 0;}
.loading.show{display:block;}
.spinner{width:26px;height:26px;margin:0 auto 10px;border:2px solid var(--border);border-top-color:var(--pink-deep);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ldtxt{font-size:13px;color:var(--text-soft);}
.dots::after{content:'';animation:dots 1.4s infinite;}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
.err{background:#FEF0F0;border:1px solid #F5C6CB;border-radius:var(--r-sm);padding:11px 14px;font-size:13px;color:#8B1A1A;display:none;margin-top:8px;}
.err.show{display:block;}
.out-wrap{display:none;margin-top:18px;}
.out-wrap.show{display:block;}
.otabs{display:flex;gap:6px;margin-bottom:12px;}
.otab{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--cream);color:var(--text-mid);transition:all .15s;}
.otab.active{background:var(--pink-soft);border-color:var(--pink-deep);color:var(--pink-deep);}
.opanel{display:none;}
.opanel.active{display:block;}
.ocard{background:#FAFAFA;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.ocard-h{padding:10px 16px;display:flex;align-items:center;gap:8px;background:linear-gradient(90deg,var(--pink-soft),var(--sage-soft));}
.ocard-b{padding:14px 16px;}
.editable{font-size:13px;line-height:1.9;color:var(--text);background:var(--cream);border-radius:var(--r-sm);padding:13px;outline:none;cursor:text;border:1.5px solid transparent;white-space:pre-wrap;min-height:60px;}
.editable:focus{border-color:var(--pink-deep);}
.crow{display:flex;gap:8px;margin-top:9px;}
.cbtn{background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 13px;font-size:11px;font-family:'DM Sans',sans-serif;color:var(--text-mid);cursor:pointer;transition:all .15s;}
.cbtn:hover{border-color:var(--pink-deep);color:var(--pink-deep);}
.cbtn.ok{background:var(--sage-soft);border-color:#7AAB6D;color:#3D6B35;}
.rrow{display:flex;gap:8px;margin-top:10px;align-items:center;}
.rinput{flex:1;background:var(--cream);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 10px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;}
.rbtn{background:var(--purple);color:white;border:none;border-radius:var(--r-sm);padding:7px 14px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;}
.sp-box{background:var(--purple-soft);border:1.5px solid var(--purple);border-radius:var(--r);padding:14px;margin-bottom:14px;}
.sp-title{font-size:12px;font-weight:500;color:#5B4FA0;margin-bottom:10px;}
.sp-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s;}
.sp-card:hover{border-color:var(--purple);}
.sp-card.sel{border-color:var(--purple);background:var(--purple-soft);}
.sp-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;}
.sp-meta{display:flex;gap:10px;font-size:11px;color:var(--text-soft);}
.sp-hl{font-size:11px;color:var(--text-mid);margin-top:3px;}
.cl-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.cl-stat{background:var(--cream);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;text-align:center;}
.cl-stat-n{font-size:24px;font-weight:500;font-family:'Playfair Display',serif;color:#6B5C50;}
.cl-stat-l{font-size:10px;color:var(--text-soft);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.cl-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
.cl-leg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-mid);}
.cl-dot{width:8px;height:8px;border-radius:50%;}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px;}
.cal-hdr{text-align:center;font-size:10px;font-weight:500;color:var(--text-soft);letter-spacing:.05em;text-transform:uppercase;padding:5px 0;}
.cal-cell{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px;min-height:76px;cursor:pointer;transition:all .15s;}
.cal-cell:hover{border-color:#8C7B6B;}
.cal-cell.on{border-color:#8C7B6B;box-shadow:0 2px 10px rgba(140,123,107,.2);}
.cal-cell.sp{background:linear-gradient(135deg,var(--gold-soft),var(--pink-soft));border-color:var(--gold);}
.cal-cell.em{background:transparent;border-color:transparent;cursor:default;}
.cal-date{font-size:11px;font-weight:500;color:var(--text-mid);margin-bottom:3px;}
.pill{font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.pi{background:var(--sage-soft);color:#3D6B35;}
.pv{background:var(--pink-soft);color:var(--pink-deep);}
.ps{background:var(--gold-soft);color:#7A5C1A;}
.dd{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;display:none;margin-top:14px;}
.dd.show{display:block;}
.dd-title{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:14px;}
.dpost{border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin-bottom:12px;}
.dpost-h{padding:10px 14px;display:flex;align-items:center;gap:8px;}
.dph-i{background:var(--sage-soft);}
.dph-v{background:var(--pink-soft);}
.dph-s{background:var(--gold-soft);}
.dpost-b{padding:12px 14px;background:#FAFAFA;}
.ds{margin-bottom:10px;}
.ds-l{font-size:10px;font-weight:500;color:var(--text-soft);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.ds-c{font-size:12.5px;color:var(--text);line-height:1.8;background:var(--cream);border-radius:var(--r-sm);padding:10px 12px;}
</style>
</head>

let CP=null,CT=null,SB='',SPD=null;

function selPage(i){
  CP=PAGES[i];
  document.querySelectorAll('.page-card').forEach((c,j)=>{
    c.classList.toggle('active',j===i);
    c.style.borderColor=j===i?CP.color:'var(--border)';
    c.style.background=j===i?CP.bg:'var(--white)';
  });
  const ca=document.getElementById('ca');
  ca.style.display='block';
  const ph=document.getElementById('ph');
  ph.style.background='linear-gradient(135deg,'+CP.bg+',#fff)';
  ph.innerHTML='<div style="font-size:28px">'+CP.icon+'</div><div><div style="font-family:\'Playfair Display\',serif;font-size:18px;font-weight:500;color:'+CP.color+'">'+CP.name+'</div><div style="font-size:12px;color:var(--text-soft);margin-top:2px">'+CP.sub+'</div></div>';
  CT=null;SB='';SPD=null;
  if(i===4) renderCL();
  else if(i===0||i===1) renderFashion();
  else if(i===2) renderKids();
  else renderGD();
  setTimeout(function(){ca.scrollIntoView({behavior:'smooth',block:'start'});},100);
}

async function genFromTitle(){

  if(!title){alert('Vui lòng nhập tên sản phẩm!');return;}

  var g=CP.id===0?'nam':'nữ';
  var fb=document.getElementById('plt-fb')&&document.getElementById('plt-fb').checked;
  var ig=document.getElementById('plt-ig')&&document.getElementById('plt-ig').checked;
  var zl=document.getElementById('plt-zl')&&document.getElementById('plt-zl').checked;

  ldm.classList.add('show');

  var platforms=[];
  if(fb) platforms.push('FACEBOOK');
  if(ig) platforms.push('INSTAGRAM');
  if(zl) platforms.push('ZALO');

  var prompt='Viet bai quang cao san pham thoi trang '+g+' cho cac nen tang mang xa hoi.\n\n'+
    'THONG TIN SAN PHAM:\n'+

async function searchFromLink(){

  var isFlashSale=url.includes('flash_sale')||url.includes('flashsale')||url.includes('flash-sale')||url.includes('campain')||url.includes('voucher');

    var spName='';

      if(pathMatch){spName=pathMatch[1].replace(/-i\.\d+\.\d+.*/,'').replace(/-/g,' ').trim();}

    status.textContent='Tên SP: "'+spName+'" — đang tìm thông tin...';

    var parsed=JSON.parse(m[0]);

    if(isFlashSale&&parsed.products){
      // Hiện danh sách flash sale
      var prods=parsed.products||[];
      status.textContent='⚡ Tìm được '+prods.length+' SP Flash Sale! Click để viết bài:';
      status.style.color='#3D6B35';
      window._sprods={brand:parsed.brand||brand,products:prods,type:'flashsale'};
      document.getElementById('sresults').style.display='block';
      document.getElementById('sresults').innerHTML=prods.map(function(p,i){
        return '<div class="sp-card" onclick="selSP('+i+')" id="spc'+i+'">'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">'+

          (p.discount?'<span style="background:#E8401C;color:white;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500">⚡ -'+p.discount+'</span>':'')+
          '</div>'+
          '<div class="sp-meta">'+
          '<span style="color:#E8401C;font-weight:500">💰 '+p.price+'</span>'+
          (p.original_price?'<span style="text-decoration:line-through;color:var(--text-soft)">'+p.original_price+'</span>':'')+
          '<span>⭐ '+p.rating+'</span><span>🛒 '+p.sold+' đã bán</span>'+
          '</div>'+
          '<div class="sp-hl">✨ '+p.highlight+'</div>'+

      }).join('');
    } else {
      // SP đơn lẻ
      SPD={name:parsed.name||'',brand:parsed.brand||brand,price:parsed.price||'',original_price:parsed.original_price||'',discount:parsed.discount||'',rating:parsed.rating||'',sold:parsed.sold||'',description:parsed.highlight||'',highlights:[parsed.highlight||''],link:url,isFlash:!!(parsed.discount&&parsed.discount!=='')};
      status.innerHTML='✅ <strong>'+SPD.name+'</strong> — '+SPD.price+(SPD.discount?' <span style="color:#E8401C;font-weight:500">(-'+SPD.discount+')</span>':'')+' ⭐'+SPD.rating+' 🛒'+SPD.sold+' <button onclick="genFromSPD()" style="background:var(--pink-btn);color:white;border:none;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:\'DM Sans\',sans-serif;margin-left:6px;">✨ Viết bài</button>';
      status.style.color='#3D6B35';
    }
  }catch(e){status.textContent='Lỗi: '+e.message;status.style.color='#8B1A1A';}
  btn.textContent='🔍 Tìm SP này';btn.disabled=false;

async function searchSP(){
  var key=gv('api-key');
  var brand=SB||gv('fcb');
  if(!key){alert('Vui lòng nhập API Key!');return;}
  if(!brand){alert('Vui lòng chọn hoặc nhập brand!');return;}
  var btn=document.getElementById('sbtn');
  var status=document.getElementById('sstatus');
  var results=document.getElementById('sresults');
  btn.innerHTML='⏳ Đang tìm...';btn.disabled=true;
  status.style.display='block';status.style.color='#5B4FA0';
  status.textContent='Đang search Shopee...';
  results.style.display='none';SPD=null;
  var g=CP.id===0?'nam':'nữ';

  try{
    var prompt='Search Shopee Viet Nam: san pham thoi trang '+g+' cua "'+brand+'". Tim 10 SP ban chay nhat va 10 SP rating cao nhat (4.9-5 sao).\n\nTra ve DUNG format sau, moi SP phai co du 5 truong:\n===BAN_CHAY===\n===SP1===\nten: Combo 3 Quan Lot Nam Trunk Bamboo\ngia: 269.000 VND\nsao: 4.9\nda_ban: 50.000+\nnoi_bat: Chat lieu bamboo khang khuan, mem mai\n===SP2===\nten: [ten]\ngia: [gia]\nsao: [sao]\nda_ban: [luot ban]\nnoi_bat: [mo ta]\n[tiep tuc den SP10]\n===DANH_GIA===\n===SP1===\nten: [ten]\ngia: [gia]\nsao: [sao]\nda_ban: [luot ban]\nnoi_bat: [mo ta]\n[tiep tuc den SP10]\nLUU Y: Moi truong deu phai co gia tri, khong de trong hay undefined.';

    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1500,
        messages:[{role:'user',content:prompt}]
      })
    });
    var d=await r.json();
    if(d.error) throw new Error(d.error.message);

    var text=(d.content||[]).filter(function(c){return c.type==='text';}).map(function(c){return c.text;}).join('\n');
    if(!text){throw new Error('Không lấy được kết quả');}

    function parseSection(txt,marker){
      var prods=[];
      var parts=txt.split(marker);
      if(parts.length<2) return prods;
      var section=parts[1];
      var end=section.search(/===BAN_CHAY===|===DANH_GIA===/);
      if(end>-1) section=section.substring(0,end);
      section.split(/===SP\d+===/).forEach(function(part){
        if(!part.trim()) return;
        var obj={};
        part.trim().split('\n').forEach(function(line){
          var sep=line.indexOf(':');
          if(sep>-1){
            var k=line.substring(0,sep).trim();
            var v=line.substring(sep+1).trim();
            if(k==='ten') obj.name=v;
            else if(k==='gia') obj.price=v;
            else if(k==='sao') obj.rating=v;
            else if(k==='da_ban') obj.sold=v;
            else if(k==='noi_bat') obj.highlight=v;
          }
        });
        if(obj.name&&obj.price&&obj.price!=='undefined'&&obj.rating&&obj.rating!=='undefined') prods.push(obj);
      });
      return prods;
    }

    var p1=parseSection(text,'===BAN_CHAY===');
    var p2=parseSection(text,'===DANH_GIA===');

    if(!p1.length&&!p2.length){
      status.textContent='Không tìm được — thử lại hoặc nhập tên SP thủ công!';
      status.style.color='#8B4513';
      btn.innerHTML='🔥⭐ Tìm SP bán chạy + đánh giá cao nhất';btn.disabled=false;
      return;
    }

    status.textContent='✅ Tìm được SP của '+brand+' từ Shopee! Click để viết bài:';
    status.style.color='#3D6B35';
    results.style.display='block';
    window._sprods={brand:brand,bestseller:p1,toprated:p2};

    function renderCards(prods,type){
      if(!prods.length) return '<div style="font-size:12px;color:var(--text-soft);padding:8px">Không có kết quả</div>';
      return prods.map(function(p,i){
        return '<div class="sp-card" onclick="selSP2(\''+type+'\','+i+')" id="spc-'+type+'-'+i+'">'+
          '<div class="sp-name">'+p.name+'</div>'+
          '<div class="sp-meta">'+
          '<span>💰 '+p.price+'</span>'+
          '<span style="color:#E8A020;font-weight:500">⭐ '+p.rating+'</span>'+
          '<span>🛒 '+p.sold+'</span>'+
          '</div>'+
          '<div class="sp-hl">✨ '+p.highlight+'</div>'+
          '</div>';
      }).join('');
    }

    results.innerHTML=
      '<div style="display:flex;gap:6px;margin-bottom:10px">'+
      '<div id="rtab0" onclick="swRT(0)" style="flex:1;padding:7px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--purple);background:var(--purple);color:white;text-align:center">🔥 Bán chạy nhất</div>'+
      '<div id="rtab1" onclick="swRT(1)" style="flex:1;padding:7px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--cream);color:var(--text-mid);text-align:center">⭐ Đánh giá cao</div>'+
      '</div>'+
      '<div id="rpanel0">'+renderCards(p1,'bestseller')+'</div>'+
      '<div id="rpanel1" style="display:none">'+renderCards(p2,'toprated')+'</div>';

  }catch(e){
    status.textContent='Lỗi: '+e.message;status.style.color='#8B1A1A';
  }
  btn.innerHTML='🔥⭐ Tìm SP bán chạy + đánh giá cao nhất';btn.disabled=false;
}

// ── GENERATE ──
function buildPrompt(){
  var pid=CP.id,ct=CT,g=pid===0?'nam':'nữ';
  var brand=SB||gv('fcb')||'thuong hieu';
  if(pid===0||pid===1){
    if(ct==='brand') return 'Viet bai gioi thieu san pham thoi trang '+g+' Facebook. Brand: '+brand+'. SP: '+(gv('fpt')||'outfit')+'. Style: '+(gv('fst')||'Casual')+'.\n150-200 chu tieng Viet, hook manh, mo ta dep, goi y phoi, CTA. 15 hashtag.\n===BAI===\n(noi dung)\n===CAPTION===\n(caption+hashtag)';
    if(ct==='trend') return 'Viet bai xu huong thoi trang '+g+' '+(gv('fs')||'He 2026')+' Facebook. Style: "'+(gv('fts')||'Casual')+'". 200-250 chu. 15 hashtag.\n===BAI===\n(noi dung)\n===CAPTION===\n(caption+hashtag)';
    if(ct==='tips') return 'Viet bai tips phoi do '+g+' Facebook. Chu de: "'+(gv('ftp')||'phoi do')+'". 200-250 chu, 5 tips thuc te. 15 hashtag.\n===BAI===\n(noi dung)\n===CAPTION===\n(caption+hashtag)';
    if(ct==='caption') return 'Viet caption thoi trang '+g+' Facebook. Anh: "'+(gv('fcd')||'outfit')+'". 80-120 chu, hook manh. 15 hashtag.\n===BAI===\n(caption)\n===CAPTION===\n(version ngan+hashtag)';
  }
  if(pid===2){
    var brand2=SB||gv('fcb')||'brand';
    if(ct==='fashion') return 'Viet bai gioi thieu thoi trang tre em Facebook. Brand: '+brand2+'. SP: '+(gv('fprd')||'quan ao')+'. Tuoi: '+(gv('fage')||'3-6 tuoi')+'.\n150-200 chu, mo ta dang yeu, chat lieu an toan. 15 hashtag.\n===BAI===\n(noi dung)\n===CAPTION===\n(caption+hashtag)';
    if(ct==='toygd'||ct==='toycb') return 'Viet bai review do choi tre em Facebook. SP: '+brand2+'. Chi tiet: '+(gv('fdet')||'uu diem, phu hop ai')+'.\n200-250 chu: mo ta, loi ich, an toan. 15 hashtag.\n===BAI===\n(noi dung)\n===CAPTION===\n(caption+hashtag)';
    if(ct==='book') return 'Viet bai gioi thieu sach thieu nhi Facebook. Sach: '+brand2+'. Chi tiet: '+(gv('fdet')||'noi dung, phu hop ai')+'.\n200-250 chu. 15 hashtag.\n===BAI===\n(noi dung)\n===CAPTION===\n(caption+hashtag)';
    if(ct==='parent') return 'Viet bai tips nuoi day con Facebook. Chu de: "'+(gv('fpar')||'nuoi con')+'". 250-300 chu, 3-5 tips thuc te. 15 hashtag.\n===BAI===\n(noi dung)\n===CAPTION===\n(caption+hashtag)';
  }
  if(pid===3){
    var sp=SB||gv('gprd')||'san pham gia dung';
    if(ct==='review') return 'Viet bai review "'+sp+'" gia '+(gv('gpr')||'tam trung')+' Facebook gia dung.'+(gv('ghl')?' Noi bat: '+gv('ghl'):'')+'\n250-300 chu: mo ta, uu nhuoc, ai nen mua. 15 hashtag.\n===BAI===\n(noi dung)\n===CAPTION===\n(caption+hashtag)';
    if(ct==='tips') return 'Viet bai tips gia dung ve "'+(gv('gtp')||'do gia dung')+'" Facebook. 200-250 chu, 5 tips. 15 hashtag.\n===BAI===\n(noi dung)\n===CAPTION===\n(caption+hashtag)';
    if(ct==='compare') return 'Viet bai so sanh "'+(gv('gpa')||'SP A')+'" vs "'+(gv('gpb')||'SP B')+'" Facebook gia dung. 250-300 chu: gia, chat luong, ai nen mua. 15 hashtag.\n===BAI===\n(noi dung)\n===CAPTION===\n(caption+hashtag)';
    if(ct==='toplist') return 'Viet bai "'+(gv('gln')||'Top 5')+' '+(gv('glt')||'san pham')+'" Facebook gia dung. 250-300 chu. 15 hashtag.\n===BAI===\n(noi dung)\n===CAPTION===\n(caption+hashtag)';
  }
  return '';
}

async function gen(){
  var key=gv('api-key');
  var err=document.getElementById('errm');
  err.classList.remove('show');
  if(!key){err.textContent='Vui long nhap API Key!';err.classList.add('show');return;}
  var prompt=buildPrompt();
  if(!prompt){err.textContent='Vui long dien day du thong tin!';err.classList.add('show');return;}
  document.getElementById('ldm').classList.add('show');
  document.getElementById('ow').classList.remove('show');
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,messages:[{role:'user',content:prompt}]})});
    var d=await r.json();
    document.getElementById('ldm').classList.remove('show');
    if(d.error){err.textContent='API loi: '+d.error.message;err.classList.add('show');return;}
    if(!d.content||!d.content[0]){err.textContent='Khong co response. Thu lai!';err.classList.add('show');return;}
    var raw=d.content[0].text.trim();
    var bai=raw.includes('===BAI===')?raw.split('===BAI===')[1].split('===CAPTION===')[0].trim():raw;
    var cap=raw.includes('===CAPTION===')?raw.split('===CAPTION===')[1].trim():'';
    rOut(bai,cap);
  }catch(e){document.getElementById('ldm').classList.remove('show');err.textContent='Loi: '+e.message;err.classList.add('show');}
}

function rOut(bai,cap){
  document.getElementById('ots').innerHTML='<div class="otab active" onclick="swO(0,this)">📝 Bài viết</div><div class="otab" onclick="swO(1,this)">📌 Caption</div>';
  document.getElementById('ops').innerHTML=
    '<div class="opanel active" id="op0"><div class="ocard"><div class="ocard-h"><span style="font-size:16px">📝</span><span style="font-size:13px;font-weight:500">Bài viết</span><span style="font-size:10px;color:var(--text-soft);margin-left:auto">✏️ Click chỉnh</span></div><div class="ocard-b"><div class="editable" id="obai" contenteditable="true" spellcheck="false">'+bai+'</div><div class="rrow"><input type="text" class="rinput" id="rbi" placeholder="Yêu cầu chỉnh..."><button class="rbtn" onclick="ren(\'bai\')">🔄</button></div><div class="crow"><button class="cbtn" id="cbb" onclick="cp(\'obai\',\'cbb\',\'📋 Copy bài\')">📋 Copy bài viết</button></div></div></div></div>'+
    '<div class="opanel" id="op1"><div class="ocard"><div class="ocard-h"><span style="font-size:16px">📌</span><span style="font-size:13px;font-weight:500">Caption + Hashtag</span></div><div class="ocard-b"><div class="editable" id="ocap" contenteditable="true" spellcheck="false" style="white-space:pre-wrap">'+cap+'</div><div class="crow"><button class="cbtn" id="cbc" onclick="cp(\'ocap\',\'cbc\',\'📋 Copy\')">📋 Copy caption</button></div></div></div></div>';
  document.getElementById('ow').classList.add('show');
}

function swO(i,el){document.querySelectorAll('.otab').forEach(function(t,j){t.classList.toggle('active',j===i);});document.querySelectorAll('.opanel').forEach(function(p,j){p.classList.toggle('active',j===i);});}

async function ren(type){
  var key=gv('api-key');
  var fb=gv('r'+type[0]+'i');
  var cur=document.getElementById('o'+type).innerText;
  var btn=event.target;
  if(!fb){alert('Gop yeu cau chinh truoc!');return;}
  btn.textContent='⏳';btn.disabled=true;
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,messages:[{role:'user',content:'Bai viet: "'+cur+'"\nYeu cau: "'+fb+'"\nViet lai. Chi tra ve noi dung moi.'}]})});
    var d=await r.json();
    if(!d.error) document.getElementById('o'+type).textContent=d.content[0].text.trim();
    document.getElementById('rb'+type[0]).value='';
  }catch(e){alert('Loi: '+e.message);}
  btn.textContent='🔄';btn.disabled=false;
}

function buildCal(){
  var g=document.getElementById('calg');
  ['CN','Hai','Ba','Tư','Năm','Sáu','Bảy'].forEach(function(d){var h=document.createElement('div');h.className='cal-hdr';h.textContent=d;g.appendChild(h);});
  for(var i=0;i<6;i++){var e=document.createElement('div');e.className='cal-cell em';g.appendChild(e);}
  PLAN.forEach(function(day,idx){
    var c=document.createElement('div');
    c.className='cal-cell'+(day.sp?' sp':'');
    c.onclick=(function(index,cell){return function(){showDD(index,cell);};})(idx,c);
    c.innerHTML='<div class="cal-date">'+day.date+'</div>'+day.posts.map(function(p){return '<div class="pill '+(p.t==='i'?'pi':p.t==='v'?'pv':'ps')+'">'+(p.t==='i'?'🌿':p.t==='v'?'🎬':'⭐')+' '+p.ti.substring(0,16)+'...</div>';}).join('');
    g.appendChild(c);
  });
}

function showDD(idx,cell){
  document.querySelectorAll('.cal-cell').forEach(function(c){c.classList.remove('on');});
  cell.classList.add('on');
  var day=PLAN[idx];
  var dd=document.getElementById('ddetail');
  dd.innerHTML='<div class="dd-title">📅 '+day.date+' — '+day.th+'</div>'+
    day.posts.map(function(p,pi){
      var hdr='dph-'+(p.t==='i'?'i':p.t==='v'?'v':'s');
      var icon=p.t==='i'?'🌿':p.t==='v'?'🎬':'⭐';
      var lbl=p.t==='i'?'ẢNH + QUOTE':p.t==='v'?'VIDEO':'ĐẶC BIỆT';
      var id=idx+''+pi;
      return '<div class="dpost">'+
        '<div class="dpost-h '+hdr+'"><span style="font-size:15px">'+icon+'</span><span style="font-size:13px;font-weight:500;color:var(--text)">'+p.tm+' — '+p.ti+'</span><span style="font-size:10px;color:var(--text-soft);margin-left:auto;text-transform:uppercase">'+lbl+'</span></div>'+
        '<div class="dpost-b">'+
        '<div class="ds"><div class="ds-l">💬 Câu nói chữa lành</div><div class="ds-c" id="q'+id+'">'+p.q+'</div><button class="cbtn" style="margin-top:6px" onclick="cpEl(\'q'+id+'\',this)">📋 Copy</button></div>'+
        '<div class="ds" style="margin-top:10px"><div class="ds-l">🎨 Prompt ảnh — Google Flow</div><div class="ds-c" id="pi'+id+'">'+p.pi+'</div><button class="cbtn" style="margin-top:6px" onclick="cpEl(\'pi'+id+'\',this)">📋 Copy prompt ảnh</button></div>'+
        (p.pv?'<div class="ds" style="margin-top:10px"><div class="ds-l">🎬 Prompt video — Veo3</div><div class="ds-c" id="pv'+id+'" style="white-space:pre-wrap">'+p.pv+'</div><button class="cbtn" style="margin-top:6px" onclick="cpEl(\'pv'+id+'\',this)">📋 Copy prompt video</button></div>':'')+
        '<div class="ds" style="margin-top:10px"><div class="ds-l">📌 Caption + Hashtag</div><div class="ds-c" id="ca'+id+'" style="white-space:pre-wrap">'+p.ca+'</div><button class="cbtn" style="margin-top:6px" onclick="cpEl(\'ca'+id+'\',this)">📋 Copy caption</button></div>'+
        '</div></div>';
    }).join('');
  dd.classList.add('show');
  setTimeout(function(){dd.scrollIntoView({behavior:'smooth',block:'start'});},100);
}

// ── UTILS ──
function fbCopy(text){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);}
function cp(s,b,l){var text=document.getElementById(s).innerText,btn=document.getElementById(b);var done=function(){btn.textContent='✓ OK!';btn.classList.add('ok');setTimeout(function(){btn.textContent=l;btn.classList.remove('ok');},2000);};if(navigator.clipboard&&window.isSecureContext)navigator.clipboard.writeText(text).then(done).catch(function(){fbCopy(text);done();});else{fbCopy(text);done();}}
function cpEl(id,btn){var text=document.getElementById(id).innerText;var o=btn.textContent;var done=function(){btn.textContent='✓ OK!';btn.classList.add('ok');setTimeout(function(){btn.textContent=o;btn.classList.remove('ok');},2000);};if(navigator.clipboard&&window.isSecureContext)navigator.clipboard.writeText(text).then(done).catch(function(){fbCopy(text);done();});else{fbCopy(text);done();}}

selPage(0);
